name: CI

# Swiper 是 Windows-only 桌面应用（NSIS/MSI + cfg(windows) 依赖 + WinRT OcrEngine），
# 故 CI 整体跑在 windows-latest。check 与 build 两个 job 并行。
on:
  push:
    branches: [main, master]
  pull_request:

env:
  # 关闭增量编译，CI 全量更稳；同时让 cargo 缓存命中率更高
  CARGO_INCREMENTAL: 0
  # 让依赖在编译失败时更快失败（更早吐错误）
  RUST_BACKTRACE: 1

jobs:
  check:
    name: Lint & Type-check
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Install Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install Rust (stable, MSVC)
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install JS deps
        run: pnpm install --frozen-lockfile

      - name: Svelte / TS type-check
        run: pnpm check

      - name: cargo fmt
        working-directory: src-tauri
        run: cargo fmt --check

      - name: cargo clippy
        working-directory: src-tauri
        run: cargo clippy --all-targets -- -D warnings

  build:
    name: Build Windows installers
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Install Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install Rust (stable, MSVC)
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install JS deps
        run: pnpm install --frozen-lockfile

      # tauri.conf.json 的 beforeBuildCommand = "pnpm build"，会自动跑 vite build
      - name: Build (Tauri)
        run: pnpm tauri build

      - name: Upload NSIS installer
        uses: actions/upload-artifact@v4
        with:
          name: swiper-nsis
          path: src-tauri/target/release/bundle/nsis/*.exe
          if-no-files-found: error

      - name: Upload MSI installer
        uses: actions/upload-artifact@v4
        with:
          name: swiper-msi
          path: src-tauri/target/release/bundle/msi/*.msi
          if-no-files-found: error
